<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>GradJobsUK — UK Graduate Jobs with Visa Sponsorship</title>
    <meta name="description" content="Find UK graduate jobs with visa sponsorship for international students. Real-time data updated every 6 hours from LinkedIn. Filter by location, salary, and job type." />
    <meta name="keywords" content="UK graduate jobs, visa sponsorship UK, international students jobs UK, skilled worker visa jobs, graduate schemes UK, London jobs, tech jobs UK" />
    <link rel="canonical" href="https://job-search-uk.vercel.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://job-search-uk.vercel.app" />
    <meta property="og:title" content="GradJobsUK — UK Graduate Jobs with Visa Sponsorship" />
    <meta property="og:description" content="Find UK graduate jobs with visa sponsorship for international students. Updated every 6 hours. Filter by location, salary, and skill." />
    <meta property="og:site_name" content="GradJobsUK" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="GradJobsUK — UK Graduate Jobs with Visa Sponsorship" />
    <meta name="twitter:description" content="Real-time UK graduate jobs for international students. Filter by visa sponsorship, location, and salary." />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GradJobsUK",
      "url": "https://job-search-uk.vercel.app",
      "description": "UK graduate jobs with visa sponsorship for international students",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://job-search-uk.vercel.app?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
